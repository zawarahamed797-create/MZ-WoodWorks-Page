<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works</title>
    <style>
        body { margin: 0; padding: 0; background: #f4f4f4; }

        /* Top Pati */
        .header-bar {
            background-color: #2c1e12; 
            width: 100%;
            padding: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            color: #f1b24a;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Side Gears */
        .gear {
            position: absolute;
            font-size: 40px;
            opacity: 0.3;
            animation: gearRotate 5s linear infinite;
        }
        .gear-left { left: 20px; }
        .gear-right { right: 20px; }

        .logo-container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .letters {
            font-size: 60px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .m-letter, .z-letter {
            opacity: 0;
            position: relative;
            display: inline-block;
        }

        /* Screw Styling */
        .screw {
            position: absolute;
            font-size: 18px;
            opacity: 0;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Animations Logic */
        .m-letter { animation: fadeIn 0.3s forwards 0.5s; }
        .z-letter { animation: fadeIn 0.3s forwards 2.5s; }

        /* M par screw tight hona */
        .m-letter .screw {
            animation: screwTighten 1.5s ease-in-out 0.8s forwards;
        }

        /* Z par screw tight hona */
        .z-letter .screw {
            animation: screwTighten 1.5s ease-in-out 2.8s forwards;
        }

        .sub-text {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-top: 10px;
            opacity: 0;
            border-top: 2px solid #f1b24a;
            padding-top: 5px;
            animation: slideUp 0.8s forwards 4.5s;
        }

        /* Keyframes */
        @keyframes fadeIn { to { opacity: 1; } }

        @keyframes gearRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes screwTighten {
            0% { opacity: 1; transform: translateX(-50%) translateY(-20px) rotate(0deg) scale(1.5); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0) rotate(720deg) scale(1); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0) rotate(720deg) scale(0.8); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="gear gear-left">⚙️</div>
        <div class="gear gear-right">⚙️</div>

        <div class="logo-container">
            <div class="letters">
                <span class="m-letter">
                    M <span class="screw">🔩</span>
                </span>
                <span class="z-letter">
                    Z <span class="screw">🔩</span>
                </span>
            </div>
            <div class="sub-text">Wood Works</div>
        </div>
    </div>

</body>
</html>
