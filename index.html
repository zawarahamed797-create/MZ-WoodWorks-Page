<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works</title>
    <style>
        body { margin: 0; padding: 0; background: #e0e0e0; }

        .header-bar {
            background-color: #2c1e12; 
            width: 100%;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            color: #f1b24a;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            border-bottom: 5px solid #1a120b;
        }

        .gear {
            position: absolute;
            font-size: 50px;
            opacity: 0.15;
            animation: gearRotate 8s linear infinite;
        }
        .gear-left { left: 30px; top: 20px; }
        .gear-right { right: 30px; bottom: 20px; animation-direction: reverse; }

        .logo-container { text-align: center; position: relative; }

        .letters {
            font-size: 70px;
            display: flex;
            gap: 15px;
            justify-content: center;
            line-height: 1;
        }

        .m-letter, .z-letter {
            opacity: 0;
            position: relative;
            display: inline-block;
            text-shadow: 2px 4px 5px rgba(0,0,0,0.5);
        }

        /* Screw Point - Letter ke andar ek chota hole feel dene ke liye */
        .screw {
            position: absolute;
            font-size: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -150%); /* Start position upar */
            opacity: 0;
            z-index: 5;
            filter: drop-shadow(0 2px 2px black);
        }

        /* Keyframe Animations */
        .m-letter { animation: fadeIn 0.3s forwards 0.5s, letterShake 0.2s 1.8s; }
        .z-letter { animation: fadeIn 0.3s forwards 2.5s, letterShake 0.2s 3.8s; }

        /* Screw tightening and sinking into wood effect */
        .m-letter .screw {
            animation: screwIntoWood 1.5s ease-in-out 0.8s forwards;
        }

        .z-letter .screw {
            animation: screwIntoWood 1.5s ease-in-out 2.8s forwards;
        }

        .sub-text {
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-top: 15px;
            opacity: 0;
            transform: scaleX(0);
            border-top: 2px solid #f1b24a;
            animation: borderExpand 0.8s forwards 4.5s;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        @keyframes gearRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @keyframes screwIntoWood {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -100px) rotate(0deg) scale(2); 
            }
            30% { 
                opacity: 1; 
                transform: translate(-50%, -50%) rotate(360deg) scale(1.2); 
            }
            100% { 
                opacity: 1; 
                transform: translate(-50%, -50%) rotate(1440deg) scale(0.7); /* Scale chota hona matlab andar dhas gaya */
                filter: contrast(1.2) brightness(0.8);
            }
        }

        @keyframes letterShake {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(3px); }
        }

        @keyframes borderExpand {
            to { opacity: 1; transform: scaleX(1); }
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="gear gear-left">⚙️</div>
        <div class="gear gear-right">⚙️</div>

        <div class="logo-container">
            <div class="letters">
                <span class="m-letter">
                    M <span class="screw">🔩</span>
                </span>
                <span class="z-letter">
                    Z <span class="screw">🔩</span>
                </span>
            </div>
            <div class="sub-text">Wood Works</div>
        </div>
    </div>

</body>
</html>
