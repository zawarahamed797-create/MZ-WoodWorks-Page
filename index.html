<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('hadder1.jpg'); /* Aapki file ka naam */
            background-size: cover;
            background-position: center;
            height: 100vh;
        }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-inter { font-family: 'Inter', sans-serif; }
        .letter-spacing-wide { letter-spacing: 0.3em; }
    </style>
</head>
<body class="bg-black text-white font-inter">

    <header class="hero-section flex flex-col">
        <nav class="flex justify-between items-center p-6 md:px-12">
            <div class="text-xl md:text-2xl font-semibold tracking-wider font-playfair">MZ WOOD WORKS</div>
            <div class="space-y-1.5 cursor-pointer">
                <div class="w-6 h-0.5 bg-white"></div>
                <div class="w-6 h-0.5 bg-white"></div>
            </div>
        </nav>

        <div class="flex-grow flex flex-col justify-center items-center text-center px-6">
            <span class="text-[10px] md:text-xs uppercase letter-spacing-wide text-amber-200/70 mb-6 font-medium">
                MASTER CRAFTSMANSHIP
            </span>
            
            <h1 class="text-5xl md:text-7xl font-playfair leading-tight mb-8 max-w-4xl">
                Furniture that outlasts trends.
            </h1>
            
            <p class="text-gray-300 text-sm md:text-lg max-w-xl leading-relaxed mb-12 font-light">
                Hand-built bespoke kitchens, wardrobes, and media walls. 
                Designed with precision, crafted with soul.
            </p>

            <div class="flex flex-col gap-4 w-full max-w-xs">
                <button class="bg-[#c2a47e] hover:bg-[#b3936a] text-black font-semibold py-4 px-8 uppercase text-xs tracking-widest transition-all">
                    Book a Consultation
                </button>
                <button class="border border-white/30 hover:bg-white/10 text-white py-4 px-8 uppercase text-xs tracking-widest transition-all">
                    View Our Work
                </button>
            </div>
        </div>
    </header>

</body>
</html>
