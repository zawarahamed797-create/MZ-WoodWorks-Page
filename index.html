<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works - 5 Banners per Category</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 0; 
            background: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
            width: 100%;
        }

        .header-bar {
            background-color: #ffffff;
            width: 100%;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #ddd;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            border: none;
            background: transparent;
            padding: 5px;
            z-index: 1100;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: #2c1e12;
            border-radius: 2px;
            transition: 0.3s;
        }

        .logo-container { flex: 1; text-align: center; }
        .logo-img { 
            max-height: 60px; 
            width: auto; 
            filter: drop-shadow(0 0 8px #f1b24a); 
            animation: imgSmoothGlow 3s ease-in-out infinite; 
        }

        .nav-menu { 
            display: flex; 
            gap: 15px; 
        }
        .nav-menu a { 
            text-decoration: none; 
            color: #2c1e12; 
            font-weight: bold; 
            font-size: 14px; 
            text-transform: uppercase; 
        }

        .cart-container { cursor: pointer; font-size: 20px; }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: white;
                padding: 20px;
                box-shadow: 0 5px 10px rgba(0,0,0,0.1);
                text-align: center;
                gap: 20px;
            }
            .nav-menu.active {
                display: flex;
            }
        }

        @media (min-width: 769px) {
            .hamburger { display: none; }
        }

        .search-section {
            background: #f9f9f9;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #ddd;
        }
        .search-container {
            width: 95%; 
            display: flex;
            background: #fff;
            border: 2px solid #2c1e12;
            border-radius: 5px;
            overflow: hidden;
        }
        .search-container input { flex: 1; border: none; padding: 8px 10px; outline: none; font-size: 14px; }
        .search-container button { background: #2c1e12; color: #f1b24a; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; font-size: 12px; }

        .section-title {
            text-align: center;
            background: #2c1e12;
            color: #f1b24a;
            margin: 15px 0 0 0;
            padding: 8px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .slider-container {
            width: 100%;
            height: 250px; 
            overflow: hidden;
            position: relative;
            background: #fff;
            margin-bottom: 15px;
            border-bottom: 3px solid #f1b24a;
        }

        .slider-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.45, 0, 0.55, 1);
        }

        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 30, 18, 0.6);
            color: #f1b24a;
            padding: 10px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            z-index: 10;
        }
        .next { right: 0; }

        @media (max-width: 480px) {
            .slider-container { height: 200px; }
            .logo-img { max-height: 50px; }
        }

        @keyframes imgSmoothGlow { 0%, 100% { filter: drop-shadow(0 0 8px #f1b24a); } 50% { filter: drop-shadow(0 0 18px #ffdb94); } }
    </style>
</head>
<body>

    <header class="header-bar">
        <button class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="logo-container">
            <img src="hadder.png" alt="MZ Wood Works Logo" class="logo-img">
        </div>

        <nav class="nav-menu" id="navMenu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>

        <div class="cart-container">🛒</div>
    </header>

    <div class="search-section">
        <div class="search-container">
            <input type="text" placeholder="Search furniture...">
            <button>SEARCH</button>
        </div>
    </div>

    <div class="slider-container">
        <button class="prev" onclick="moveSlide('mainWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('mainWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="mainWrapper">
            <div class="slide"><img src="banner1.jpg" alt="Main 1"></div>
            <div class="slide"><img src="banner2.jpg" alt="Main 2"></div>
            <div class="slide"><img src="banner3.jpg" alt="Main 3"></div>
            <div class="slide"><img src="banner4.jpg" alt="Main 4"></div>
            <div class="slide"><img src="banner5.jpg" alt="Main 5"></div>
        </div>
    </div>

    <h2 class="section-title">Kitchen Designs</h2>
    <div class="slider-container">
        <button class="prev" onclick="moveSlide('kitchenWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('kitchenWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="kitchenWrapper">
            <div class="slide"><img src="kitchen1.jpg" alt="Kitchen 1"></div>
            <div class="slide"><img src="kitchen2.jpg" alt="Kitchen 2"></div>
            <div class="slide"><img src="kitchen3.jpg" alt="Kitchen 3"></div>
            <div class="slide"><img src="kitchen4.jpg" alt="Kitchen 4"></div>
            <div class="slide"><img src="kitchen5.jpg" alt="Kitchen 5"></div>
        </div>
    </div>

    <h2 class="section-title">Wardrobe Designs</h2>
    <div class="slider-container">
        <button class="prev" onclick="moveSlide('wardrobeWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('wardrobeWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="wardrobeWrapper">
            <div class="slide"><img src="wardrobe1.jpg" alt="Wardrobe 1"></div>
            <div class="slide"><img src="wardrobe2.jpg" alt="Wardrobe 2"></div>
            <div class="slide"><img src="wardrobe3.jpg" alt="Wardrobe 3"></div>
            <div class="slide"><img src="wardrobe4.jpg" alt="Wardrobe 4"></div>
            <div class="slide"><img src="wardrobe5.jpg" alt="Wardrobe 5"></div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            menu.classList.toggle('active');
        }

        const sliderStates = {
            mainWrapper: 0,
            kitchenWrapper: 0,
            wardrobeWrapper: 0
        };

        function moveSlide(wrapperId, direction) {
            const wrapper = document.getElementById(wrapperId);
            if(!wrapper) return;
            const slides = wrapper.querySelectorAll('.slide');
            
            sliderStates[wrapperId] += direction;

            if (sliderStates[wrapperId] >= slides.length) {
                sliderStates[wrapperId] = 0;
            } else if (sliderStates[wrapperId] < 0) {
                sliderStates[wrapperId] = slides.length - 1;
            }

            const offset = -sliderStates[wrapperId] * 100;
            wrapper.style.transform = `translateX(${offset}%)`;
        }
    </script>

</body>
</html>
