<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works - Double Manual Slider</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        .header-bar {
            background-color: #ffffff;
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #ddd;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1100;
        }
        .menu-toggle span {
            width: 25px;
            height: 3px;
            background-color: #2c1e12;
            border-radius: 2px;
            transition: 0.3s;
        }

        .logo-container { flex: 2; text-align: center; }
        .logo-img { max-height: 85px; width: auto; filter: drop-shadow(0 0 8px #f1b24a); animation: imgSmoothGlow 3s ease-in-out infinite; }

        .nav-menu { display: flex; gap: 20px; flex: 1; justify-content: flex-end; }
        .nav-menu a { text-decoration: none; color: #2c1e12; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .cart-container { margin-left: 20px; cursor: pointer; font-size: 24px; }

        /* --- Search Bar --- */
        .search-section {
            background: #f9f9f9;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #ddd;
        }
        .search-container {
            width: 90%;
            max-width: 800px;
            display: flex;
            background: #fff;
            border: 2px solid #2c1e12;
            border-radius: 5px;
            overflow: hidden;
        }
        .search-container input {
            flex: 1;
            border: none;
            padding: 10px 15px;
            outline: none;
            font-size: 16px;
        }
        .search-container button {
            background: #2c1e12;
            color: #f1b24a;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Sliders Common Styling --- */
        .slider-container {
            width: 100%;
            height: 400px; 
            overflow: hidden;
            position: relative;
            background: #fff;
        }
        
        /* Chota Slider height (Sections ke liye) */
        .category-slider {
            height: 300px;
            margin-top: 20px;
            border-top: 2px solid #2c1e12;
        }

        .slider-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.6s ease-in-out;
        }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Slide Label */
        .slide-label {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 30, 18, 0.8);
            color: #f1b24a;
            padding: 10px 30px;
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 30, 18, 0.7);
            color: #f1b24a;
            padding: 15px;
            cursor: pointer;
            border: none;
            font-size: 20px;
            z-index: 10;
        }
        .next { right: 0; }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #ffffff;
                padding: 20px;
                text-align: center;
                box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            }
            .nav-menu.active { display: flex; }
            .slider-container { height: 250px; }
            .category-slider { height: 220px; }
        }

        @keyframes imgSmoothGlow { 0%, 100% { filter: drop-shadow(0 0 8px #f1b24a); } 50% { filter: drop-shadow(0 0 18px #ffdb94); } }
    </style>
</head>
<body>

    <header class="header-bar">
        <div class="menu-toggle" onclick="toggleMobileMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="logo-container">
            <img src="hadder.png" alt="MZ Wood Works Logo" class="logo-img">
        </div>
        <nav class="nav-menu" id="navMenu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
        <div class="cart-container" onclick="openCart()">🛒</div>
    </header>

    <div class="search-section">
        <div class="search-container">
            <input type="text" placeholder="Search for sofa, beds, or custom wood work...">
            <button>SEARCH</button>
        </div>
    </div>

    <div class="slider-container">
        <button class="prev" onclick="moveSlide('mainWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('mainWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="mainWrapper">
            <div class="slide"><img src="banner1.jpg" alt="Wood Work 1"></div>
            <div class="slide"><img src="banner2.jpg" alt="Wood Work 2"></div>
            <div class="slide"><img src="banner3.jpg" alt="Wood Work 3"></div>
        </div>
    </div>

    <div class="slider-container category-slider">
        <button class="prev" onclick="moveSlide('catWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('catWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="catWrapper">
            <div class="slide">
                <img src="kitchen_thumb.jpg" alt="Kitchen">
                <a href="kitchen.html" class="slide-label">Kitchen</a>
            </div>
            <div class="slide">
                <img src="wardrobe_thumb.jpg" alt="Wardrobe">
                <a href="wardrobe.html" class="slide-label">Wardrobe</a>
            </div>
            <div class="slide">
                <img src="mediawall.html" alt="Media Wall">
                <a href="mediawall.html" class="slide-label">Media Wall</a>
            </div>
        </div>
    </div>

    <script>
        function openCart() { alert("Cart opening..."); }
        function toggleMobileMenu() {
            document.getElementById('navMenu').classList.toggle('active');
        }

        // Logic for both sliders
        const sliderStates = {
            mainWrapper: 0,
            catWrapper: 0
        };

        function moveSlide(wrapperId, direction) {
            const wrapper = document.getElementById(wrapperId);
            const slides = wrapper.querySelectorAll('.slide');
            
            sliderStates[wrapperId] += direction;

            if (sliderStates[wrapperId] >= slides.length) {
                sliderStates[wrapperId] = 0;
            } else if (sliderStates[wrapperId] < 0) {
                sliderStates[wrapperId] = slides.length - 1;
            }

            const offset = -sliderStates[wrapperId] * 100;
            wrapper.style.transform = `translateX(${offset}%)`;
        }
    </script>

</body>
</html>
