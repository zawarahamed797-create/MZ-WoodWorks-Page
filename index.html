<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works - Image Logo Header</title>
    <style>
        body { margin: 0; padding: 0; background: #e0e0e0; }

        .header-bar {
            background-color: #2c1e12; 
            width: 100%;
            padding: 15px 0; /* Slim height */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid #1a120b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .logo-container {
            text-align: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logo Image Styling */
        .logo-img {
            max-height: 80px; /* Aap isay apni marzi se chota bara kar saktay hain */
            width: auto;
            opacity: 0;
            transform: scale(0.8);
            /* Glow effect jo image par nazar aaye ga */
            filter: drop-shadow(0 0 10px #f1b24a);
            animation: 
                imgPopIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s,
                imgSmoothGlow 3s ease-in-out infinite;
        }

        /* --- Animations --- */

        /* Image ka jhatkay se zahir hona */
        @keyframes imgPopIn {
            to { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        /* Image par constant sunehri roshni ka effect */
        @keyframes imgSmoothGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 8px #f1b24a);
            }
            50% { 
                filter: drop-shadow(0 0 20px #ffdb94) brightness(1.1);
            }
        }

    </style>
</head>
<body>

    <div class="header-bar">
        <div class="logo-container">
            <img src="hadder.jpg" alt="MZ Wood Works Logo" class="logo-img">
        </div>
    </div>

</body>
</html>
