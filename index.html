<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works - Separate Category Sliders</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        .header-bar {
            background-color: #ffffff;
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #ddd;
        }

        .logo-container { flex: 2; text-align: center; }
        .logo-img { max-height: 85px; width: auto; filter: drop-shadow(0 0 8px #f1b24a); animation: imgSmoothGlow 3s ease-in-out infinite; }

        .nav-menu { display: flex; gap: 20px; flex: 1; justify-content: flex-end; }
        .nav-menu a { text-decoration: none; color: #2c1e12; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* --- Hamburger Menu Icon --- */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            background: none;
            border: none;
        }
        .hamburger span {
            width: 30px;
            height: 4px;
            background-color: #2c1e12;
            border-radius: 2px;
        }

        .cart-container { margin-left: 20px; cursor: pointer; font-size: 24px; }

        /* --- Search Bar --- */
        .search-section {
            background: #f9f9f9;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #ddd;
        }
        .search-container {
            width: 90%;
            max-width: 800px;
            display: flex;
            background: #fff;
            border: 2px solid #2c1e12;
            border-radius: 5px;
            overflow: hidden;
        }
        .search-container input { flex: 1; border: none; padding: 10px 15px; outline: none; font-size: 16px; }
        .search-container button { background: #2c1e12; color: #f1b24a; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }

        /* --- Slider Styling --- */
        .section-title {
            text-align: center;
            background: #2c1e12;
            color: #f1b24a;
            margin: 20px 0 0 0;
            padding: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .slider-container {
            width: 100%;
            height: 350px; 
            overflow: hidden;
            position: relative;
            background: #fff;
            margin-bottom: 20px;
            border-bottom: 3px solid #f1b24a;
        }

        .slider-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.45, 0, 0.55, 1);
        }

        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 30, 18, 0.7);
            color: #f1b24a;
            padding: 15px;
            cursor: pointer;
            border: none;
            font-size: 20px;
            z-index: 10;
        }
        .next { right: 0; }

        /* --- Responsive View --- */
        @media (max-width: 768px) {
            .slider-container { height: 250px; }
            
            .hamburger { display: flex; } /* Show 3 lines */
            
            .nav-menu { 
                display: none; /* Hide menu by default on mobile */
                flex-direction: column;
                position: absolute;
                top: 105px;
                left: 0;
                width: 100%;
                background: white;
                padding: 20px;
                border-bottom: 2px solid #f1b24a;
                text-align: center;
                z-index: 999;
            }

            .nav-menu.active { display: flex; } /* Show when active */
        }

        @keyframes imgSmoothGlow { 0%, 100% { filter: drop-shadow(0 0 8px #f1b24a); } 50% { filter: drop-shadow(0 0 18px #ffdb94); } }
    </style>
</head>
<body>

    <header class="header-bar">
        <button class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="logo-container">
            <img src="hadder.png" alt="MZ Wood Works Logo" class="logo-img">
        </div>

        <nav class="nav-menu" id="navMenu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
        
        <div class="cart-container">🛒</div>
    </header>

    <div class="search-section">
        <div class="search-container">
            <input type="text" placeholder="Search for sofa, beds, or custom wood work...">
            <button>SEARCH</button>
        </div>
    </div>

    <div class="slider-container">
        <button class="prev" onclick="moveSlide('mainWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('mainWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="mainWrapper">
            <div class="slide"><img src="banner1.jpg" alt="Main 1"></div>
            <div class="slide"><img src="banner2.jpg" alt="Main 2"></div>
        </div>
    </div>

    <h2 class="section-title">Kitchen Designs</h2>
    <div class="slider-container">
        <button class="prev" onclick="moveSlide('kitchenWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('kitchenWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="kitchenWrapper">
            <div class="slide"><img src="kitchen1.jpg" alt="Kitchen 1"></div>
            <div class="slide"><img src="kitchen2.jpg" alt="Kitchen 2"></div>
        </div>
    </div>

    <h2 class="section-title">Wardrobe Designs</h2>
    <div class="slider-container">
        <button class="prev" onclick="moveSlide('wardrobeWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('wardrobeWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="wardrobeWrapper">
            <div class="slide"><img src="wardrobe1.jpg" alt="Wardrobe 1"></div>
            <div class="slide"><img src="wardrobe2.jpg" alt="Wardrobe 2"></div>
        </div>
    </div>

    <h2 class="section-title">Media Wall Designs</h2>
    <div class="slider-container">
        <button class="prev" onclick="moveSlide('mediaWrapper', -1)">&#10094;</button>
        <button class="next" onclick="moveSlide('mediaWrapper', 1)">&#10095;</button>
        <div class="slider-wrapper" id="mediaWrapper">
            <div class="slide"><img src="media1.jpg" alt="Media Wall 1"></div>
            <div class="slide"><img src="media2.jpg" alt="Media Wall 2"></div>
        </div>
    </div>

    <script>
        // Toggle Mobile Menu
        function toggleMenu() {
            const nav = document.getElementById('navMenu');
            nav.classList.toggle('active');
        }

        // Individual states for each slider
        const sliderStates = {
            mainWrapper: 0,
            kitchenWrapper: 0,
            wardrobeWrapper: 0,
            mediaWrapper: 0
        };

        function moveSlide(wrapperId, direction) {
            const wrapper = document.getElementById(wrapperId);
            const slides = wrapper.querySelectorAll('.slide');
            
            sliderStates[wrapperId] += direction;

            if (sliderStates[wrapperId] >= slides.length) {
                sliderStates[wrapperId] = 0;
            } else if (sliderStates[wrapperId] < 0) {
                sliderStates[wrapperId] = slides.length - 1;
            }

            const offset = -sliderStates[wrapperId] * 100;
            wrapper.style.transform = `translateX(${offset}%)`;
        }
    </script>

</body>
</html>
