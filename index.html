<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works - Search & Manual Slider</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        .header-bar {
            background-color: #ffffff;
            width: 100%;
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #ddd;
        }

        .logo-container { flex: 2; text-align: center; }
        .logo-img { max-height: 85px; width: auto; filter: drop-shadow(0 0 8px #f1b24a); animation: imgSmoothGlow 3s ease-in-out infinite; }

        .nav-menu { display: flex; gap: 20px; flex: 1; justify-content: flex-end; margin-right: 20px; }
        .nav-menu a { text-decoration: none; color: #2c1e12; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .cart-container { margin-right: 20px; cursor: pointer; font-size: 24px; }

        /* --- New Search Bar Style (Above Banner) --- */
        .search-section {
            background: #f9f9f9;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #ddd;
        }
        .search-container {
            width: 90%;
            max-width: 800px;
            display: flex;
            background: #fff;
            border: 2px solid #2c1e12;
            border-radius: 5px;
            overflow: hidden;
        }
        .search-container input {
            flex: 1;
            border: none;
            padding: 10px 15px;
            outline: none;
            font-size: 16px;
        }
        .search-container button {
            background: #2c1e12;
            color: #f1b24a;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Manual Slider Styling --- */
        .slider-container {
            width: 100%;
            height: 400px; 
            overflow: hidden;
            position: relative;
        }
        .slider-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.6s ease-in-out;
        }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Navigation Arrows */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 30, 18, 0.7);
            color: #f1b24a;
            padding: 15px;
            cursor: pointer;
            border: none;
            font-size: 20px;
            z-index: 10;
            border-radius: 0 5px 5px 0;
            transition: 0.3s;
        }
        .next { right: 0; border-radius: 5px 0 0 5px; }
        .prev:hover, .next:hover { background: rgba(241, 178, 74, 0.9); color: #2c1e12; }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .slider-container { height: 250px; }
        }

        @keyframes imgSmoothGlow { 0%, 100% { filter: drop-shadow(0 0 8px #f1b24a); } 50% { filter: drop-shadow(0 0 18px #ffdb94); } }
    </style>
</head>
<body>

    <header class="header-bar">
        <div class="logo-container">
            <img src="hadder.png" alt="MZ Wood Works Logo" class="logo-img">
        </div>
        <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
        <div class="cart-container" onclick="openCart()">🛒</div>
    </header>

    <div class="search-section">
        <div class="search-container">
            <input type="text" placeholder="Search for sofa, beds, or custom wood work...">
            <button>SEARCH</button>
        </div>
    </div>

    <div class="slider-container">
        <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="next" onclick="moveSlide(1)">&#10095;</button>
        
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="slide"><img src="banner1.jpg" alt="Wood Work 1"></div>
            <div class="slide"><img src="banner2.jpg" alt="Wood Work 2"></div>
            <div class="slide"><img src="banner3.jpg" alt="Wood Work 3"></div>
        </div>
    </div>

    <script>
        function openCart() { alert("Cart opening..."); }

        // --- Manual Slider Logic ---
        let currentIndex = 0;
        const wrapper = document.getElementById('sliderWrapper');
        const slides = document.querySelectorAll('.slide');

        function moveSlide(direction) {
            currentIndex += direction;

            if (currentIndex >= slides.length) {
                currentIndex = 0; // Wapis pehli slide par
            } else if (currentIndex < 0) {
                currentIndex = slides.length - 1; // Akhri slide par
            }

            const offset = -currentIndex * 100;
            wrapper.style.transform = `translateX(${offset}%)`;
        }
    </script>

</body>
</html>
