<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works - White Header</title>
    <style>
        body { margin: 0; padding: 0; background: #e0e0e0; }

        .header-bar {
            background-color: #ffffff; /* Background White kar diya gaya hai */
            width: 100%;
            padding: 12px 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid #ddd; /* Light border taake white page par nazar aaye */
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .logo-container {
            text-align: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logo Image Styling */
        .logo-img {
            max-height: 70px; 
            width: auto;
            opacity: 0;
            transform: scale(0.8);
            /* Glow effect (White background par ye halka golden saaya dega) */
            filter: drop-shadow(0 0 8px #f1b24a);
            animation: 
                imgPopIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s,
                imgSmoothGlow 3s ease-in-out infinite;
        }

        /* --- Animations --- */

        @keyframes imgPopIn {
            to { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        @keyframes imgSmoothGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 10px #f1b24a);
            }
            50% { 
                filter: drop-shadow(0 0 22px #ffdb94) brightness(1.1);
            }
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="logo-container">
            <img src="hadder.png" alt="MZ Wood Works Logo" class="logo-img">
        </div>
    </div>

</body>
</html>
