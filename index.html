<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works - Responsive Header</title>
    <style>
        body { margin: 0; padding: 0; background: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Header Bar Adjustment */
        .header-bar {
            background-color: #ffffff;
            width: 100%;
            padding: 10px 0;
            display: flex;
            justify-content: space-around; /* Logo aur Menu ko balance karne ke liye */
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .logo-container {
            flex: 1;
            text-align: center;
        }

        .logo-img {
            max-height: 60px;
            width: auto;
            opacity: 0;
            transform: scale(0.8);
            filter: drop-shadow(0 0 8px #f1b24a);
            animation: imgPopIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s,
                       imgSmoothGlow 3s ease-in-out infinite;
        }

        /* Desktop Navigation */
        .nav-menu {
            display: flex;
            gap: 25px;
            margin-right: 40px;
        }

        .nav-menu a {
            text-decoration: none;
            color: #2c1e12;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-menu a:hover {
            color: #f1b24a;
        }

        /* Mobile Menu Button (Funky Style) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            margin-right: 20px;
            padding: 10px;
            background: #2c1e12;
            border-radius: 8px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: #f1b24a;
            border-radius: 2px;
            transition: 0.4s;
        }

        /* Mobile View (Media Query) */
        @media (max-width: 768px) {
            .nav-menu {
                display: none; /* Mobile par default hide */
                flex-direction: column;
                position: absolute;
                top: 70px;
                right: 20px;
                background: #ffffff;
                width: 200px;
                border: 2px solid #f1b24a;
                border-radius: 12px;
                padding: 20px;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                z-index: 999;
            }

            .nav-menu.active {
                display: flex; /* Click karne par show */
                animation: slideDown 0.4s ease forwards;
            }

            .menu-toggle {
                display: flex; /* Mobile par toggle button show */
            }
        }

        /* Animations */
        @keyframes imgPopIn { to { opacity: 1; transform: scale(1); } }

        @keyframes imgSmoothGlow {
            0%, 100% { filter: drop-shadow(0 0 8px #f1b24a); }
            50% { filter: drop-shadow(0 0 18px #ffdb94) brightness(1.1); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <header class="header-bar">
        <div class="logo-container">
            <img src="hadder.png" alt="MZ Wood Works Logo" class="logo-img">
        </div>

        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav class="nav-menu" id="navMenu">
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            menu.classList.toggle('active');
        }
    </script>

</body>
</html>
