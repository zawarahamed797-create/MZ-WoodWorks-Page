<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works</title>
    <style>
        /* Top Pati (Header) */
        .header-bar {
            background-color: #2c1e12; /* Dark wood color */
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #f1b24a; /* Golden wood text color */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            position: relative;
        }

        /* MZ Letters */
        .letters {
            font-size: 50px;
            font-weight: bold;
            letter-spacing: 5px;
            display: flex;
            justify-content: center;
        }

        .m-letter, .z-letter {
            opacity: 0;
            position: relative;
        }

        /* Animation for M */
        .m-letter {
            animation: fadeIn 0.5s forwards 0.5s;
        }

        /* Animation for Z */
        .z-letter {
            animation: fadeIn 0.5s forwards 2s;
        }

        /* Screw Tightening Effect (Simplified as a flash/shake) */
        .m-letter::after, .z-letter::after {
            content: '⚙️'; /* Drill/Screw icon represent karne ke liye */
            position: absolute;
            top: -10px;
            font-size: 20px;
            opacity: 0;
        }

        .m-letter::after {
            animation: drillEffect 1s ease-in-out 0.7s;
        }

        .z-letter::after {
            animation: drillEffect 1s ease-in-out 2.2s;
        }

        /* Wood Works Text */
        .sub-text {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-top: 5px;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.8s forwards 3.5s;
        }

        /* Animations Keyframes */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes drillEffect {
            0% { transform: rotate(0deg) scale(1.5); opacity: 1; }
            50% { transform: rotate(360deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(720deg) scale(1); opacity: 0; }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="logo-container">
            <div class="letters">
                <span class="m-letter">M</span>
                <span class="z-letter">Z</span>
            </div>
            <div class="sub-text">Wood Works</div>
        </div>
    </div>

</body>
</html>
